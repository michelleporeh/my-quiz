<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joey the Cat — Find Your Vibe</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* =====================================================================
   STYLE GUIDE — quick reference for changing the look
   COLORS:  #cc44ff main purple · #ff88ff pink · #aa00ff button · #0a0014 bg
   JOEY SIZE: search "JOEY_SIZE"
   FONT SIZES: search "font-size" in the relevant block
===================================================================== */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Press Start 2P',monospace;background:#0a0014;color:#fff;min-height:100vh;overflow-x:hidden;}

#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
.scanlines{position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.08) 0px,rgba(0,0,0,0.08) 1px,transparent 1px,transparent 3px);z-index:1;pointer-events:none;}

#quiz-wrap{position:relative;min-height:100vh;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;z-index:3;}
.content{width:100%;max-width:100%;position:relative;}
.arcade-frame{border:4px solid #cc44ff;background:rgba(8,0,20,0.85);padding:2.5rem 3rem 3rem;position:relative;box-shadow:0 0 40px rgba(180,0,255,0.4),0 0 80px rgba(100,0,200,0.2),inset 0 0 30px rgba(150,0,255,0.05);min-height:90vh;display:flex;flex-direction:column;justify-content:center;}
.arcade-frame::before{content:'';position:absolute;top:7px;left:7px;right:7px;bottom:7px;border:1px solid rgba(200,80,255,0.2);pointer-events:none;}

#arcade-scene{position:absolute;left:0;right:0;bottom:0;height:180px;z-index:0;opacity:.5;pointer-events:none;}

.inner{position:relative;z-index:2;}

/* fade wrapper — every screen fades in/out through this */
#app{transition:opacity 0.6s ease;opacity:1;}

.hud{display:flex;justify-content:space-between;font-size:10px;color:#cc44ff;letter-spacing:2px;margin-bottom:1.2rem;text-shadow:0 0 8px #cc44ff;}
.progress-rail{width:100%;height:10px;background:#1a0030;border:1px solid #440066;margin-bottom:2rem;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#cc44ff,#ff44cc);transition:width .15s linear;box-shadow:0 0 10px #cc44ff;}

.joey-layout{display:flex;gap:40px;align-items:flex-end;min-height:380px;}
.joey-side{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;width:220px;}
.joey-name{font-size:9px;color:#cc44ff;text-shadow:0 0 6px #cc44ff;margin-top:10px;letter-spacing:2px;text-align:center;}

#intro-screen{display:flex;flex-direction:column;align-items:center;text-align:center;}
.brand-title{display:block;font-size:24px;color:#ff88ff;letter-spacing:6px;margin-bottom:.8rem;text-shadow:0 0 14px #ff44ff,0 0 28px #cc00ff;}
.px-divider{width:100%;height:3px;background:repeating-linear-gradient(90deg,#cc44ff 0px,#cc44ff 8px,transparent 8px,transparent 16px);margin:1.5rem 0;opacity:.3;}

#intro-joey-row{display:flex;gap:40px;align-items:flex-end;justify-content:center;width:100%;margin:1.5rem 0 1.8rem;min-height:260px;}
#intro-joey-wrap{display:flex;flex-direction:column;align-items:center;position:relative;}
#intro-gif{height:auto;image-rendering:pixelated;transform:translateX(-600px);transition:transform 0.9s cubic-bezier(.22,1,.36,1);}
#intro-idle{height:auto;image-rendering:pixelated;display:none;animation:joey-breathe 1.8s ease-in-out infinite;}
@keyframes joey-breathe{0%,100%{transform:scaleY(1) translateY(0);}50%{transform:scaleY(0.97) translateY(2px);}}

#intro-bubble{position:relative;background:rgba(40,0,80,0.95);border:3px solid #cc44ff;border-radius:6px;padding:1.4rem 1.8rem;max-width:540px;text-align:left;box-shadow:0 0 20px rgba(180,0,255,0.3);opacity:0;transform:translateY(10px);transition:opacity 0.5s ease,transform 0.5s ease;}
#intro-bubble.visible{opacity:1;transform:translateY(0);}
#intro-bubble::before{content:'';position:absolute;left:-18px;bottom:30px;width:0;height:0;border-top:9px solid transparent;border-bottom:9px solid transparent;border-right:18px solid #cc44ff;}
#intro-bubble::after{content:'';position:absolute;left:-13px;bottom:31px;width:0;height:0;border-top:8px solid transparent;border-bottom:8px solid transparent;border-right:14px solid rgba(40,0,80,0.95);}
.intro-line{font-size:13px;line-height:2.2;color:#fff;margin-bottom:.8rem;opacity:0;transition:opacity 1.1s ease;}
.intro-line.show{opacity:1;}
.intro-line:last-child{margin-bottom:0;}
.intro-line .pink{color:#ff88ff;}

.bubble-side{flex:1;display:flex;flex-direction:column;gap:16px;}
.speech-bubble{position:relative;background:rgba(40,0,80,0.95);border:3px solid #cc44ff;border-radius:6px;padding:1.4rem 1.6rem;box-shadow:0 0 18px rgba(180,0,255,0.3);}
.speech-bubble::before{content:'';position:absolute;left:-18px;bottom:34px;width:0;height:0;border-top:9px solid transparent;border-bottom:9px solid transparent;border-right:18px solid #cc44ff;}
.speech-bubble::after{content:'';position:absolute;left:-13px;bottom:35px;width:0;height:0;border-top:8px solid transparent;border-bottom:8px solid transparent;border-right:14px solid rgba(40,0,80,0.95);}
.bubble-label{font-size:8px;color:#ff88ff;letter-spacing:2px;margin-bottom:.6rem;text-shadow:0 0 6px #ff44ff;}
.bubble-text{font-size:14px;line-height:2.1;color:#fff;text-shadow:0 0 4px rgba(255,255,255,0.2);min-height:1.5em;}

.options-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:6px;}
.options-grid.single-col{grid-template-columns:1fr;}
.pxbtn{font-family:'Press Start 2P',monospace;font-size:11px;line-height:1.75;color:#fff;background:rgba(60,0,100,0.6);border:3px solid #7722bb;padding:18px 14px;cursor:pointer;text-align:left;position:relative;width:100%;letter-spacing:.2px;transition:all .12s;text-shadow:0 0 4px rgba(255,255,255,0.2);display:flex;align-items:center;gap:12px;}
.pxbtn::after{content:'';position:absolute;bottom:-5px;right:-5px;width:100%;height:100%;background:#220044;z-index:-1;}
.pxbtn:hover{background:rgba(180,0,255,0.4);border-color:#cc44ff;box-shadow:0 0 16px rgba(180,0,255,0.5);}
.pxbtn:hover::after{background:#550099;}
.pxbtn:active{transform:translate(4px,4px);}
.pxbtn:active::after{display:none;}
.pxbtn .ltr{color:#ff88ff;font-size:12px;text-shadow:0 0 6px #ff44ff;flex-shrink:0;min-width:20px;}
.pxbtn:hover .ltr{color:#fff;}
.pxbtn.selected{background:rgba(180,0,255,0.5);border-color:#cc44ff;box-shadow:0 0 16px rgba(180,0,255,0.6);}
.pxbtn .check{margin-left:auto;color:#ff88ff;opacity:0;font-size:12px;}
.pxbtn.selected .check{opacity:1;}

.city-wrap{margin-top:12px;}
.city-label{font-size:8px;color:#e6b3ff;letter-spacing:1px;margin-bottom:.5rem;}
.select-wrap{position:relative;}
.city-select{font-family:'Press Start 2P',monospace;font-size:11px;width:100%;background:#1a0030;color:#fff;border:3px solid #7722bb;padding:14px 12px;cursor:pointer;appearance:none;-webkit-appearance:none;outline:none;}
.city-select:focus{border-color:#cc44ff;box-shadow:0 0 10px rgba(180,0,255,0.4);}
.city-select option{background:#1a0030;color:#fff;}
.select-wrap::after{content:'▼';font-size:8px;color:#cc44ff;position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;}

.field{margin-top:12px;}
.field label{display:block;font-size:8px;color:#e6b3ff;letter-spacing:1px;margin-bottom:.4rem;}
.field input{font-family:'Press Start 2P',monospace;font-size:10px;width:100%;background:#1a0030;color:#fff;border:3px solid #7722bb;padding:14px 12px;outline:none;}
.field input:focus{border-color:#cc44ff;box-shadow:0 0 10px rgba(180,0,255,0.4);}

.nav-row{display:flex;gap:12px;margin-top:1.2rem;align-items:center;flex-wrap:wrap;}
.next-btn{font-family:'Press Start 2P',monospace;font-size:11px;color:#fff;background:linear-gradient(135deg,#6600cc,#aa00ff);border:3px solid #cc44ff;padding:16px 32px;cursor:pointer;letter-spacing:1px;box-shadow:0 0 20px rgba(180,0,255,0.5),5px 5px 0 #330066;text-shadow:0 0 6px rgba(255,255,255,0.5);}
.next-btn:active{transform:translate(4px,4px);box-shadow:none;}
.next-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:5px 5px 0 #333;}
.back-btn{font-family:'Press Start 2P',monospace;font-size:9px;color:#ffb3ff;background:transparent;border:1px solid #7722bb;padding:14px 20px;cursor:pointer;letter-spacing:1px;}
.back-btn:hover{border-color:#cc44ff;color:#cc44ff;}

.result-msg{font-size:14px;line-height:2.2;color:#fff;min-height:1.5em;}
.result-msg .pink{color:#ff88ff;text-shadow:0 0 8px #ff44ff;}
.event-block{border:3px solid #cc44ff;border-radius:6px;padding:1.2rem 1.4rem;margin-top:1.2rem;box-shadow:0 0 18px rgba(180,0,255,0.4);}
.event-label{font-size:8px;color:#ff88ff;letter-spacing:2px;margin-bottom:.6rem;}
.event-name{font-size:13px;color:#fff;line-height:1.8;margin-bottom:1rem;}
.cta-btn{font-family:'Press Start 2P',monospace;font-size:11px;color:#fff;background:linear-gradient(135deg,#6600cc,#aa00ff);border:3px solid #cc44ff;padding:16px 24px;cursor:pointer;box-shadow:0 0 18px rgba(180,0,255,0.5),5px 5px 0 #330066;letter-spacing:.5px;display:inline-block;line-height:1.8;text-decoration:none;text-shadow:0 0 6px rgba(255,255,255,0.5);}
.cta-btn:active{transform:translate(4px,4px);box-shadow:none;}

/* fade-in helper for content that appears after the typewriter finishes */
.soft-in{opacity:0;transition:opacity 0.6s ease;}
.soft-in.show{opacity:1;}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="scanlines"></div>

<div id="quiz-wrap">
  <div class="content">
    <div class="arcade-frame">
      <canvas id="arcade-scene"></canvas>
      <div class="inner"><div id="app"></div></div>
    </div>
  </div>
</div>

<script>
/* ╔════════════════════════════════════════════════════════════╗
   ║  SECTION 1 — CONFIG                                         ║
   ╚════════════════════════════════════════════════════════════╝ */
var CONFIG = {
  joeyGif:  "joey_walk-in.gif",
  joeyIdle: "joey_idle.png",
  introDelay: 5000,

  /* Photobooth bar names shown in the intro */
  bars: ["[Bar 1]","[Bar 2]","[Bar 3]"],

  /* City dropdown (shown if they pick "just visiting / from elsewhere") */
  cities: ["Los Angeles","Sacramento","Denver","[Photobooth City 1]","[Photobooth City 2]","Other"],

  nextEvent: {
    headline: "Skee-Ball League — kicking off August 2026.",
    buttonText: "Join the league",
    buttonLink: "https://yoursite.com/league"
  }
};

/* ╔════════════════════════════════════════════════════════════╗
   ║  SECTION 2 — GALAXY BACKGROUND                             ║
   ╚════════════════════════════════════════════════════════════╝ */
(function(){
  var c=document.getElementById('bg-canvas'),ctx=c.getContext('2d'),W,H,stars=[],shapes=[],nebulas=[];
  function rand(a,b){return a+Math.random()*(b-a);}
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;init();}
  function init(){
    stars=[];for(var i=0;i<220;i++)stars.push({x:rand(0,W),y:rand(0,H),r:rand(.5,2.2),tw:rand(0,Math.PI*2),sp:rand(.003,.012),br:rand(.4,1)});
    shapes=[];var types=['planet','ring-planet','star4','diamond','triangle','circle','squiggle'];
    for(var j=0;j<26;j++)shapes.push({type:types[Math.floor(Math.random()*types.length)],x:rand(0,W),y:rand(0,H),size:rand(8,30),color:['#cc44ff','#8800ff','#ff44cc','#4488ff','#00ccff','#ff2288'][Math.floor(Math.random()*6)],speed:rand(.1,.4),angle:rand(0,Math.PI*2),rotS:rand(-.012,.012),alpha:rand(.12,.45)});
    nebulas=[];var nc=[{r:120,g:0,b:200},{r:80,g:0,b:160},{r:160,g:0,b:255},{r:100,g:20,b:180}];
    for(var n=0;n<5;n++){var col=nc[n%nc.length];nebulas.push({x:rand(0,W),y:rand(0,H),rx:rand(120,300),ry:rand(80,200),col:col,al:rand(.04,.10)});}
  }
  function dp(x,y,s,col,al,ring){ctx.save();ctx.globalAlpha=al;var g=ctx.createRadialGradient(x-s*.3,y-s*.3,s*.1,x,y,s);g.addColorStop(0,'rgba(255,255,255,0.3)');g.addColorStop(.5,col);g.addColorStop(1,'rgba(0,0,0,0.5)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,s,0,Math.PI*2);ctx.fill();if(ring){ctx.globalAlpha=al*.6;ctx.strokeStyle=col;ctx.lineWidth=s*.25;ctx.beginPath();ctx.ellipse(x,y,s*1.8,s*.5,-.3,0,Math.PI*2);ctx.stroke();}ctx.restore();}
  function ds4(x,y,s,col,al){ctx.save();ctx.globalAlpha=al;ctx.fillStyle=col;ctx.beginPath();for(var i=0;i<8;i++){var r=i%2===0?s:s*.4,a=i*Math.PI/4;i===0?ctx.moveTo(x+r*Math.cos(a),y+r*Math.sin(a)):ctx.lineTo(x+r*Math.cos(a),y+r*Math.sin(a));}ctx.closePath();ctx.fill();ctx.restore();}
  function dtr(x,y,s,col,al){ctx.save();ctx.globalAlpha=al;ctx.strokeStyle=col;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x,y-s);ctx.lineTo(x+s,y+s);ctx.lineTo(x-s,y+s);ctx.closePath();ctx.stroke();ctx.restore();}
  function ddi(x,y,s,col,al){ctx.save();ctx.globalAlpha=al;ctx.strokeStyle=col;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x,y-s);ctx.lineTo(x+s,y);ctx.lineTo(x,y+s);ctx.lineTo(x-s,y);ctx.closePath();ctx.stroke();ctx.restore();}
  function dsq(x,y,s,col,al){ctx.save();ctx.globalAlpha=al;ctx.strokeStyle=col;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x-s,y);ctx.bezierCurveTo(x-s/2,y-s,x+s/2,y+s,x+s,y);ctx.stroke();ctx.restore();}
  function draw(){
    ctx.clearRect(0,0,W,H);
    var bg=ctx.createLinearGradient(0,0,W,H);bg.addColorStop(0,'#050010');bg.addColorStop(.35,'#0d0028');bg.addColorStop(.7,'#160040');bg.addColorStop(1,'#0a0020');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    for(var i=0;i<nebulas.length;i++){var nb=nebulas[i];var ng=ctx.createRadialGradient(nb.x,nb.y,0,nb.x,nb.y,Math.max(nb.rx,nb.ry));ng.addColorStop(0,'rgba('+nb.col.r+','+nb.col.g+','+nb.col.b+','+nb.al+')');ng.addColorStop(1,'rgba('+nb.col.r+','+nb.col.g+','+nb.col.b+',0)');ctx.save();ctx.beginPath();ctx.ellipse(nb.x,nb.y,nb.rx,nb.ry,0,0,Math.PI*2);ctx.fillStyle=ng;ctx.fill();ctx.restore();}
    for(var i=0;i<stars.length;i++){var s=stars[i];s.tw+=s.sp;var al=s.br*(.5+.5*Math.sin(s.tw));ctx.save();ctx.globalAlpha=al;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();if(s.r>1.5){ctx.globalAlpha=al*.4;ctx.strokeStyle='#fff';ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(s.x-s.r*3,s.y);ctx.lineTo(s.x+s.r*3,s.y);ctx.stroke();ctx.beginPath();ctx.moveTo(s.x,s.y-s.r*3);ctx.lineTo(s.x,s.y+s.r*3);ctx.stroke();}ctx.restore();}
    for(var i=0;i<shapes.length;i++){var sh=shapes[i];sh.y+=sh.speed;sh.angle+=sh.rotS;if(sh.y>H+40)sh.y=-40;ctx.save();ctx.translate(sh.x,sh.y);ctx.rotate(sh.angle);if(sh.type==='planet')dp(0,0,sh.size,sh.color,sh.alpha,false);else if(sh.type==='ring-planet')dp(0,0,sh.size,sh.color,sh.alpha,true);else if(sh.type==='star4')ds4(0,0,sh.size,sh.color,sh.alpha);else if(sh.type==='triangle')dtr(0,0,sh.size,sh.color,sh.alpha);else if(sh.type==='diamond')ddi(0,0,sh.size,sh.color,sh.alpha);else if(sh.type==='squiggle')dsq(0,0,sh.size,sh.color,sh.alpha);else{ctx.globalAlpha=sh.alpha;ctx.strokeStyle=sh.color;ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,sh.size,0,Math.PI*2);ctx.stroke();}ctx.restore();}
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);resize();draw();
})();

/* ╔════════════════════════════════════════════════════════════╗
   ║  SECTION 3 — 8-BIT ARCADE SCENE                           ║
   ╚════════════════════════════════════════════════════════════╝ */
(function(){
  var c=document.getElementById('arcade-scene'),ctx=c.getContext('2d');
  function px(x,y,w,h,col){ctx.fillStyle=col;ctx.fillRect(x,y,w,h);}
  function skeeball(ox,oy){px(ox,oy+20,34,70,'#3a1a5a');px(ox+4,oy+24,26,40,'#c89b3c');px(ox+8,oy+10,18,16,'#1a0a2a');px(ox+10,oy+12,14,6,'#ff4488');px(ox+12,oy,10,12,'#5a2a8a');px(ox+14,oy+2,6,6,'#ffdd00');}
  function table(ox,oy){px(ox,oy+30,40,8,'#2a1a4a');px(ox+4,oy+38,4,30,'#1a0a2a');px(ox+32,oy+38,4,30,'#1a0a2a');px(ox+8,oy+22,24,10,'#cc44ff');}
  function photobooth(ox,oy){px(ox,oy,44,90,'#4a1a7a');px(ox+6,oy+8,32,28,'#1a0a2a');px(ox+10,oy+12,24,20,'#ff88ff');px(ox+6,oy+44,32,10,'#ffdd00');px(ox+8,oy+60,28,24,'#220a3a');px(ox+12,oy+60,4,24,'#cc44ff');px(ox+20,oy+60,4,24,'#cc44ff');px(ox+28,oy+60,4,24,'#cc44ff');}
  function render(){c.width=c.offsetWidth;c.height=180;ctx.clearRect(0,0,c.width,c.height);var S=1.5;ctx.save();ctx.scale(S,S);var y=20;skeeball(40,y);skeeball(100,y);table(175,y);table(235,y);photobooth((c.width/S)-90,y);ctx.restore();}
  window.addEventListener('resize',render);setTimeout(render,50);
})();

/* ╔════════════════════════════════════════════════════════════╗
   ║  SECTION 4 — JOEY'S SCRIPT                                 ║
   ╚════════════════════════════════════════════════════════════╝ */
function introLines(){
  return [
    "I recognize you...",
    "You used one of my photobooths. I've got them all over bars in SF —",
    "like <span class='pink'>"+CONFIG.bars[0]+", "+CONFIG.bars[1]+", "+CONFIG.bars[2]+"</span>, and counting.",
    "I'm Joey. 3x national Skee-Ball champ."

}

var JOEY_ASKS = {
  q_skee:    "Have you ever played Skee-Ball?",
  q_city:    "I've been doing this since I moved to San Francisco in 2008. Are you in SF?",
  q_night:   "What activities does your perfect night include?",

/* ╔════════════════════════════════════════════════════════════╗
   ║  SECTION 5 — QUESTIONS & TAGS                             ║
   ╚════════════════════════════════════════════════════════════╝ */
var LETTERS=['A','B','C','D','E','F'];

var QUESTIONS = [
  { id:"q_skee", type:"choice", options:[
    { label:"Yeah, I'm actually pretty good.", tags:["skeeball-competitor"] },
    { label:"Once or twice. Fun game",        tags:["skeeball-casual"] },
    { label:"Never.",                          tags:["skeeball-curious"] }
  ]},
  { id:"q_city", type:"city", options:[
    { label:"SF local baby",            tags:["lives-sf"] },
    { label:"Bay Area, close enough.",   tags:["bay-area"] },
    { label:"Just visiting / elsewhere.",tags:["visitor"], opensDropdown:true }
  ]},
  { id:"q_night", type:"multi", options:[

];

/* ╔════════════════════════════════════════════════════════════╗
   ║  SECTION 6 — TAGS & MAILCHIMP HOOK                         ║
   ╚════════════════════════════════════════════════════════════╝ */
var userTags=[], userData={};
function addTags(tags){ if(!tags)return; tags.forEach(function(t){ if(userTags.indexOf(t)===-1)userTags.push(t); }); }
function submitToMailchimp(isFinal){
  var payload={tags:userTags,data:userData,complete:!!isFinal};
  console.log("[Mailchimp submission]",payload);
  /* WIRE MAILCHIMP HERE — e.g. a Zapier Catch Hook:
     fetch("https://hooks.zapier.com/your-hook",{method:"POST",
       headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
  */
}

/* ╔════════════════════════════════════════════════════════════╗
   ║  SECTION 7 — QUIZ ENGINE                                   ║
   ╚════════════════════════════════════════════════════════════╝ */
var JOEY_SIZE = 200;
var phase='intro', currentQ=0, pendingAnswer=null, pendingCity=null;
var multiSelected=[], advancing=false, advanceTimer=null, quizHistory=[];

/* ── PROGRESS BAR ──
   Starts empty. Climbs in satisfying 5% increments as you move forward.
   Intro = 0%. Reaching Q1 = 30% (six 5% ticks). Then +25 per question
   (Q2 = 55, Q3 = 80), and the outro fills it to 100%. */
var progressCurrent = 0;        /* the value the bar is currently showing */
var _progTimer = null;
function progressTarget(){
  if(phase==='intro') return 0;
  if(phase==='outro') return 100;
  return 30 + currentQ*25;      /* Q1=30, Q2=55, Q3=80 */
}
function animateProgress(target){
  if(_progTimer) clearInterval(_progTimer);
  _progTimer = setInterval(function(){
    if(progressCurrent < target) progressCurrent = Math.min(target, progressCurrent + 5);
    else if(progressCurrent > target) progressCurrent = Math.max(target, progressCurrent - 5);
    else { clearInterval(_progTimer); _progTimer = null; return; }
    var f = document.getElementById('progress-fill');
    if(f) f.style.width = progressCurrent + '%';
  }, 110); /* ms between each 5% tick — raise for a slower climb */
}

var app=document.getElementById('app');

app.addEventListener('click',function(e){
  var btn=e.target.closest('[data-action]'); if(!btn||advancing)return;
  var a=btn.getAttribute('data-action');
  if(a==='choice')  selectChoice(parseInt(btn.getAttribute('data-idx'),10),btn);
  else if(a==='city')    selectCity(parseInt(btn.getAttribute('data-idx'),10),btn);
  else if(a==='multi')   toggleMulti(parseInt(btn.getAttribute('data-idx'),10),btn);
  else if(a==='next')    advanceQuestion();
  else if(a==='back')    goBack();
  else if(a==='restart') restart();
  else if(a==='slap')    chooseSlap(btn.getAttribute('data-value'));
});
app.addEventListener('change',function(e){
  if(e.target.id==='city-dd'){pendingCity=e.target.value;var nb=document.getElementById('next-btn');if(nb)nb.disabled=(pendingCity==='');}
});

function joeyImg(){return '<img src="'+CONFIG.joeyIdle+'" alt="Joey" style="width:'+JOEY_SIZE+'px;height:auto;image-rendering:pixelated;animation:joey-breathe 1.8s ease-in-out infinite;">';}
function joeyPanel(){return '<div class="joey-side">'+joeyImg()+'<p class="joey-name">JOEY</p></div>';}

/* ── SLOW FADE TRANSITION between every screen ──
   Fades the whole #app out, swaps in the next screen, fades back in. */
function transitionTo(){
  advancing=true;
  app.style.opacity='0';
  setTimeout(function(){
    render();
    /* render() set new content while invisible; now fade it up */
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        app.style.opacity='1';
        advancing=false;
      });
    });
  },600); /* matches the 0.6s CSS fade — raise both numbers for slower */
}

/* ── INTRO — Joey runs in, talks, then flows straight into Q1 (no button) ── */
function renderIntro(){
  var lines=introLines().map(function(l,i){return '<p class="intro-line" id="iline-'+i+'">'+l+'</p>';}).join('');
  app.innerHTML=
    '<div class="progress-rail"><div class="progress-fill" id="progress-fill" style="width:'+progressCurrent+'%"></div></div>'+
    '<div id="intro-screen">'+
      '<span class="brand-title">JOEY THE CAT</span>'+
      '<div class="px-divider"></div>'+
      '<div id="intro-joey-row">'+
        '<div id="intro-joey-wrap">'+
          '<img id="intro-gif" src="'+CONFIG.joeyGif+'" alt="Joey running in" style="width:'+JOEY_SIZE+'px;">'+
          '<img id="intro-idle" src="'+CONFIG.joeyIdle+'" alt="Joey" style="width:'+JOEY_SIZE+'px;">'+
          '<p class="joey-name" style="margin-top:12px;">JOEY</p>'+
        '</div>'+
        '<div id="intro-bubble">'+lines+'</div>'+
      '</div>'+
    '</div>';

  setTimeout(function(){
    var gif=document.getElementById('intro-gif'); if(gif)gif.style.transform='translateX(0)';
    setTimeout(function(){
      var g=document.getElementById('intro-gif'),id=document.getElementById('intro-idle'),b=document.getElementById('intro-bubble');
      if(g)g.style.display='none'; if(id)id.style.display='block'; if(b)b.classList.add('visible');
      /* reveal lines one at a time, slow & conversational */
      var lns=introLines();
      var gap=2200; /* ms between sentences — raise for slower, lower for faster */
      for(var i=0;i<lns.length;i++){ (function(idx){ setTimeout(function(){ var el=document.getElementById('iline-'+idx); if(el)el.classList.add('show'); }, gap*idx); })(i); }
      /* after the last line, automatically flow into the first question */
      setTimeout(function(){ startQuiz(); }, gap*lns.length + 1400);
    },CONFIG.introDelay);
  },100);
}

/* ── QUESTION (every question gets the typewriter) ── */
function renderQuestion(){
  var q=QUESTIONS[currentQ];
  if(!q){phase='outro';render();return;}
  pendingAnswer=null;pendingCity=null;multiSelected=[];
  var line=JOEY_ASKS[q.id]||'';
  var body='';

  if(q.type==='choice'){
    body='<div class="options-grid" id="opt-grid">'+
      q.options.map(function(o,i){return '<button type="button" class="pxbtn" data-action="choice" data-idx="'+i+'">'+o.label+'</button>';}).join('')+
    '</div>';
  } else if(q.type==='city'){
    body='<div class="options-grid" id="opt-grid">'+
      q.options.map(function(o,i){return '<button type="button" class="pxbtn" data-action="city" data-idx="'+i+'">'+o.label+'</button>';}).join('')+
    '</div>'+
    '<div id="city-dropdown" style="display:none;">'+
      '<div class="city-wrap"><p class="city-label">// WHERE FROM?</p><div class="select-wrap">'+
        '<select class="city-select" id="city-dd"><option value="">— pick a city —</option>'+
        CONFIG.cities.map(function(c){return '<option value="'+c+'">'+c+'</option>';}).join('')+
      '</select></div></div>'+
      '<div class="nav-row"><button type="button" class="next-btn" id="next-btn" data-action="next" disabled>NEXT</button></div>'+
    '</div>';
  } else if(q.type==='multi'){
    body='<div class="options-grid" id="opt-grid">'+
      q.options.map(function(o,i){return '<button type="button" class="pxbtn" data-action="multi" data-idx="'+i+'">'+o.label+'<span class="check">&#10003;</span></button>';}).join('')+
    '</div>'+
    '<div class="nav-row"><button type="button" class="next-btn" id="next-btn" data-action="next" disabled>NEXT</button></div>';
  }

  var back=currentQ>0?'<div class="nav-row" style="margin-top:8px;"><button type="button" class="back-btn" data-action="back">BACK</button></div>':'';

  app.innerHTML=
    '<div class="progress-rail"><div class="progress-fill" id="progress-fill" style="width:'+progressCurrent+'%"></div></div>'+
    '<div class="joey-layout">'+
      joeyPanel()+
      '<div class="bubble-side">'+
        '<div class="speech-bubble"><p class="bubble-text" id="q-type"></p></div>'+
        '<div id="q-body" class="soft-in">'+body+back+'</div>'+
      '</div>'+
    '</div>';

  /* type the question, then softly fade in the answers */
  typeText(document.getElementById('q-type'), line, 42, function(){
    var b=document.getElementById('q-body'); if(b)b.classList.add('show');
  });
  /* climb the progress bar in satisfying 5% increments */
  animateProgress(progressTarget());
}

/* ── OUTRO: typewriter on the line, then fade in options + event ── */
function renderOutro(){
  submitToMailchimp(true);
  app.innerHTML=
    '<div class="progress-rail"><div class="progress-fill" id="progress-fill" style="width:'+progressCurrent+'%"></div></div>'+
    '<div class="joey-layout" style="align-items:flex-start;">'+
      joeyPanel()+
      '<div class="bubble-side">'+
        '<div class="speech-bubble"><p class="result-msg" id="outro-type"></p>'+
          '<div id="outro-body" class="soft-in">'+
            '<div class="options-grid single-col" style="margin-top:14px;">'+
              '<button type="button" class="pxbtn" data-action="slap" data-value="ship">Ship it to me</button>'+
              '<button type="button" class="pxbtn" data-action="slap" data-value="voucher">Email me a voucher instead</button>'+
              '<button type="button" class="pxbtn" data-action="slap" data-value="person">I\'ll grab it in person</button>'+
            '</div>'+
            '<div id="slap-form"></div>'+
          '</div>'+
        '</div>'+
        '<div id="outro-event" class="soft-in">'+
          '<div class="event-block">'+
            '<p class="event-name">'+CONFIG.nextEvent.headline+'</p>'+
            '<a class="cta-btn" href="'+CONFIG.nextEvent.buttonLink+'" target="_blank">'+CONFIG.nextEvent.buttonText+'</a>'+
          '</div>'+
          '<div class="nav-row"><button type="button" class="back-btn" data-action="restart">START OVER</button></div>'+
        '</div>'+
      '</div>'+
    '</div>';

  typeText(document.getElementById('outro-type'), JOEY_ASKS.outro, 42, function(){
    var b=document.getElementById('outro-body'); if(b)b.classList.add('show');
    var ev=document.getElementById('outro-event'); if(ev)setTimeout(function(){ev.classList.add('show');},300);
  });
  /* final climb to 100% */
  animateProgress(progressTarget());
}

function chooseSlap(choice){
  addTags(["slap-"+choice]);
  var box=document.getElementById('slap-form'); if(!box)return;
  if(choice==='ship'){
    box.innerHTML='<div class="field"><label>YOUR NAME</label><input id="f-name" type="text"></div>'+
      '<div class="field"><label>MAILING ADDRESS</label><input id="f-addr" type="text"></div>'+
      '<div class="nav-row"><button type="button" class="next-btn" id="slap-save">SEND IT</button></div>';
  } else if(choice==='voucher'){
    box.innerHTML='<div class="field"><label>YOUR EMAIL</label><input id="f-email" type="email"></div>'+
      '<div class="nav-row"><button type="button" class="next-btn" id="slap-save">GET VOUCHER</button></div>';
  } else { box.innerHTML='<p class="result-msg" style="margin-top:14px;">Perfect. See you at the arcade. &#128062;</p>'; return; }
  var save=document.getElementById('slap-save');
  if(save)save.addEventListener('click',function(){
    var n=document.getElementById('f-name'),a=document.getElementById('f-addr'),e=document.getElementById('f-email');
    if(n)userData.name=n.value; if(a)userData.address=a.value; if(e)userData.email=e.value;
    submitToMailchimp(true);
    box.innerHTML='<p class="result-msg" style="margin-top:14px;">Got it. Keep an eye out. &#128062;</p>';
  });
}

/* Types text into an element one character at a time. */
var _typeTimer=null;
function typeText(el, text, speed, done){
  if(!el)return;
  if(_typeTimer)clearTimeout(_typeTimer);
  el.textContent='';
  var i=0;
  function step(){
    if(i<text.length){ el.textContent+=text.charAt(i); i++; _typeTimer=setTimeout(step, speed); }
    else if(done){ done(); }
  }
  step();
}

function render(){ if(phase==='intro')renderIntro(); else if(phase==='quiz')renderQuestion(); else renderOutro(); }

/* ── interactions ── */
function scheduleAdvance(){if(advanceTimer)clearTimeout(advanceTimer);advanceTimer=setTimeout(function(){advanceTimer=null;advanceQuestion();},350);}

function selectChoice(i,el){
  if(advancing)return;
  var grid=document.getElementById('opt-grid'); if(grid)grid.querySelectorAll('.pxbtn').forEach(function(b){b.classList.remove('selected');});
  el.classList.add('selected'); pendingAnswer=i; scheduleAdvance();
}
function selectCity(i,el){
  if(advancing)return;
  var grid=document.getElementById('opt-grid'); if(grid)grid.querySelectorAll('.pxbtn').forEach(function(b){b.classList.remove('selected');});
  el.classList.add('selected'); pendingAnswer=i;
  if(QUESTIONS[currentQ].options[i].opensDropdown){ document.getElementById('city-dropdown').style.display='block'; }
  else { scheduleAdvance(); }
}
function toggleMulti(i,el){
  var pos=multiSelected.indexOf(i);
  if(pos===-1){multiSelected.push(i);el.classList.add('selected');}
  else{multiSelected.splice(pos,1);el.classList.remove('selected');}
  var nb=document.getElementById('next-btn'); if(nb)nb.disabled=(multiSelected.length===0);
}

function advanceQuestion(){
  if(advancing)return;
  var q=QUESTIONS[currentQ];

  /* validate before locking anything in */
  if(q.type==='choice'){ if(pendingAnswer===null)return; }
  else if(q.type==='city'){ if(pendingAnswer===null)return; var opt=q.options[pendingAnswer]; if(opt.opensDropdown && !pendingCity)return; }
  else if(q.type==='multi'){ if(multiSelected.length===0)return; }

  quizHistory.push({currentQ:currentQ,tags:JSON.stringify(userTags),data:JSON.stringify(userData)});

  if(q.type==='choice'){ addTags(q.options[pendingAnswer].tags); }
  else if(q.type==='city'){ var o=q.options[pendingAnswer]; if(o.opensDropdown){ userData.city=pendingCity; addTags(["city-"+pendingCity.toLowerCase().replace(/[^a-z]/g,'-')]); } addTags(o.tags); }
  else if(q.type==='multi'){ multiSelected.forEach(function(idx){ addTags(q.options[idx].tags); }); }

  submitToMailchimp(false); /* silent submission */
  pendingAnswer=null;pendingCity=null;multiSelected=[];
  currentQ++;
  if(currentQ>=QUESTIONS.length)phase='outro';
  transitionTo();
}

function goBack(){
  if(!quizHistory.length||advancing)return;
  var p=quizHistory.pop();
  currentQ=p.currentQ; userTags=JSON.parse(p.tags); userData=JSON.parse(p.data);
  pendingAnswer=null;pendingCity=null;multiSelected=[];
  if(phase==='outro')phase='quiz';
  transitionTo();
}

function startQuiz(){
  phase='quiz';currentQ=0;userTags=[];userData={};pendingAnswer=null;pendingCity=null;multiSelected=[];quizHistory=[];
  transitionTo();
}
function restart(){
  phase='intro';currentQ=0;userTags=[];userData={};pendingAnswer=null;pendingCity=null;multiSelected=[];quizHistory=[];
  progressCurrent=0; if(_progTimer){clearInterval(_progTimer);_progTimer=null;}
  transitionTo();
}

render();
</script>
</body>
