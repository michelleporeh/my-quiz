<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joey the Cat — Find Your Player Type</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* =====================================================================
   ████  STYLE GUIDE — HOW TO CHANGE THE LOOK  ████
   ---------------------------------------------------------------------
   COLORS (find & replace these hex codes anywhere to re-theme):
     #cc44ff  = main purple (borders, glow, accents)
     #ff88ff  = pink (labels, Joey's name, result titles)
     #aa00ff  = button purple
     #0a0014  = page background (deep space)
     #fff     = white text
   FONT SIZES: search "font-size" in the section you want to resize.
   JOEY SIZE: search "JOEY_SIZE" — one number controls all his images.
   SPACING: "padding" and "gap" values control breathing room.
===================================================================== */

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Press Start 2P',monospace;background:#0a0014;color:#fff;min-height:100vh;overflow-x:hidden;}

#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
#bg-video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:0.28;z-index:0;pointer-events:none;display:none;}
.scanlines{position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.08) 0px,rgba(0,0,0,0.08) 1px,transparent 1px,transparent 3px);z-index:1;pointer-events:none;}

#quiz-wrap{position:relative;min-height:100vh;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;z-index:3;}
.content{width:100%;max-width:100%;position:relative;}
.arcade-frame{border:4px solid #cc44ff;background:rgba(8,0,20,0.90);padding:2.5rem 3rem 3rem;position:relative;box-shadow:0 0 40px rgba(180,0,255,0.4),0 0 80px rgba(100,0,200,0.2),inset 0 0 30px rgba(150,0,255,0.05);min-height:90vh;display:flex;flex-direction:column;justify-content:center;}
.arcade-frame::before{content:'';position:absolute;top:7px;left:7px;right:7px;bottom:7px;border:1px solid rgba(200,80,255,0.2);pointer-events:none;}

.hud{display:flex;justify-content:space-between;font-size:10px;color:#cc44ff;letter-spacing:2px;margin-bottom:1.2rem;text-shadow:0 0 8px #cc44ff;}
.progress-rail{width:100%;height:10px;background:#1a0030;border:1px solid #440066;margin-bottom:2rem;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#cc44ff,#ff44cc);transition:width .35s ease;box-shadow:0 0 10px #cc44ff;}

.joey-layout{display:flex;gap:40px;align-items:flex-end;min-height:380px;}
.joey-side{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;width:200px;}
.joey-name{font-size:9px;color:#cc44ff;text-shadow:0 0 6px #cc44ff;margin-top:10px;letter-spacing:2px;text-align:center;}

/* ── INTRO ── */
#intro-screen{display:flex;flex-direction:column;align-items:center;text-align:center;}
.brand-title{display:block;font-size:13px;color:#ff88ff;letter-spacing:4px;margin-bottom:.6rem;text-shadow:0 0 14px #ff44ff,0 0 28px #cc00ff;}
.px-divider{width:100%;height:3px;background:repeating-linear-gradient(90deg,#cc44ff 0px,#cc44ff 8px,transparent 8px,transparent 16px);margin:1.5rem 0;opacity:.3;}

#intro-joey-row{display:flex;gap:40px;align-items:flex-end;justify-content:center;width:100%;margin:1.5rem 0 1.8rem;min-height:240px;}
#intro-joey-wrap{display:flex;flex-direction:column;align-items:center;position:relative;}
#intro-gif{width:200px;height:auto;image-rendering:pixelated;transform:translateX(-600px);transition:transform 0.9s cubic-bezier(.22,1,.36,1);}
#intro-idle{width:200px;height:auto;image-rendering:pixelated;display:none;animation:joey-breathe 1.8s ease-in-out infinite;}
@keyframes joey-breathe{0%,100%{transform:scaleY(1) translateY(0);}50%{transform:scaleY(0.97) translateY(2px);}}

/* Intro speech lines — each line appears big and punchy */
#intro-bubble{position:relative;background:rgba(40,0,80,0.95);border:3px solid #cc44ff;padding:1.4rem 1.8rem;max-width:520px;text-align:left;box-shadow:0 0 20px rgba(180,0,255,0.3);opacity:0;transform:translateY(10px);transition:opacity 0.5s ease,transform 0.5s ease;}
#intro-bubble.visible{opacity:1;transform:translateY(0);}
#intro-bubble::before{content:'';position:absolute;left:-18px;bottom:30px;width:0;height:0;border-top:9px solid transparent;border-bottom:9px solid transparent;border-right:18px solid #cc44ff;}
#intro-bubble::after{content:'';position:absolute;left:-13px;bottom:31px;width:0;height:0;border-top:8px solid transparent;border-bottom:8px solid transparent;border-right:14px solid rgba(40,0,80,0.95);}
#intro-bubble p{font-size:13px;line-height:2.2;color:#fff;margin-bottom:.8rem;}
#intro-bubble p:last-child{margin-bottom:0;}
#intro-bubble .pink{color:#ff88ff;}

#intro-cta{opacity:0;transform:translateY(10px);transition:opacity 0.5s ease 0.3s,transform 0.5s ease 0.3s;}
#intro-cta.visible{opacity:1;transform:translateY(0);}
.start-btn{font-family:'Press Start 2P',monospace;font-size:14px;color:#fff;background:linear-gradient(135deg,#7700cc,#bb00ff);border:4px solid #ee88ff;padding:20px 48px;cursor:pointer;letter-spacing:2px;box-shadow:0 0 28px rgba(180,0,255,0.7),7px 7px 0 #330066;margin-top:1.5rem;display:inline-block;text-shadow:0 0 10px rgba(255,255,255,0.8);}
.start-btn:active{transform:translate(5px,5px);box-shadow:none;}
.blink{animation:blink 1.1s step-start infinite;}
@keyframes blink{50%{opacity:0;}}

/* ── SPEECH BUBBLE (quiz) ── */
.bubble-side{flex:1;display:flex;flex-direction:column;gap:16px;}
.speech-bubble{position:relative;background:rgba(40,0,80,0.95);border:3px solid #cc44ff;padding:1.4rem 1.6rem;box-shadow:0 0 18px rgba(180,0,255,0.3);}
.speech-bubble::before{content:'';position:absolute;left:-18px;bottom:34px;width:0;height:0;border-top:9px solid transparent;border-bottom:9px solid transparent;border-right:18px solid #cc44ff;}
.speech-bubble::after{content:'';position:absolute;left:-13px;bottom:35px;width:0;height:0;border-top:8px solid transparent;border-bottom:8px solid transparent;border-right:14px solid rgba(40,0,80,0.95);}
.bubble-label{font-size:8px;color:#ff88ff;letter-spacing:2px;margin-bottom:.6rem;text-shadow:0 0 6px #ff44ff;}
.bubble-text{font-size:14px;line-height:2.1;color:#fff;text-shadow:0 0 4px rgba(255,255,255,0.2);}

/* ── BUTTONS ── */
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px;}
.pxbtn{font-family:'Press Start 2P',monospace;font-size:11px;line-height:1.75;color:#fff;background:rgba(60,0,100,0.6);border:3px solid #7722bb;padding:18px 14px;cursor:pointer;text-align:left;position:relative;width:100%;letter-spacing:.2px;transition:all .12s;text-shadow:0 0 4px rgba(255,255,255,0.2);display:flex;align-items:center;gap:12px;}
.pxbtn::after{content:'';position:absolute;bottom:-5px;right:-5px;width:100%;height:100%;background:#220044;z-index:-1;}
.pxbtn:hover{background:rgba(180,0,255,0.4);border-color:#cc44ff;box-shadow:0 0 16px rgba(180,0,255,0.5);}
.pxbtn:hover::after{background:#550099;}
.pxbtn:active{transform:translate(4px,4px);}
.pxbtn:active::after{display:none;}
.pxbtn .ltr{color:#ff88ff;font-size:12px;text-shadow:0 0 6px #ff44ff;flex-shrink:0;min-width:20px;}
.pxbtn:hover .ltr{color:#fff;}
.pxbtn.selected{background:rgba(180,0,255,0.5);border-color:#cc44ff;box-shadow:0 0 16px rgba(180,0,255,0.6);}

/* ── CITY DROPDOWN ── */
.city-wrap{margin-top:12px;}
.city-label{font-size:8px;color:#bb88ff;letter-spacing:1px;margin-bottom:.5rem;}
.select-wrap{position:relative;}
.city-select{font-family:'Press Start 2P',monospace;font-size:11px;width:100%;background:#1a0030;color:#fff;border:3px solid #7722bb;padding:14px 12px;cursor:pointer;appearance:none;-webkit-appearance:none;outline:none;}
.city-select:focus{border-color:#cc44ff;box-shadow:0 0 10px rgba(180,0,255,0.4);}
.city-select option{background:#1a0030;color:#fff;}
.select-wrap::after{content:'▼';font-size:8px;color:#cc44ff;position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;}

/* ── TEXT INPUTS (slap bracelet form) ── */
.field{margin-top:12px;}
.field label{display:block;font-size:8px;color:#bb88ff;letter-spacing:1px;margin-bottom:.4rem;}
.field input{font-family:'Press Start 2P',monospace;font-size:10px;width:100%;background:#1a0030;color:#fff;border:3px solid #7722bb;padding:14px 12px;outline:none;}
.field input:focus{border-color:#cc44ff;box-shadow:0 0 10px rgba(180,0,255,0.4);}

/* ── NAV ── */
.nav-row{display:flex;gap:12px;margin-top:1.2rem;align-items:center;flex-wrap:wrap;}
.next-btn{font-family:'Press Start 2P',monospace;font-size:11px;color:#fff;background:linear-gradient(135deg,#6600cc,#aa00ff);border:3px solid #cc44ff;padding:16px 32px;cursor:pointer;letter-spacing:1px;box-shadow:0 0 20px rgba(180,0,255,0.5),5px 5px 0 #330066;text-shadow:0 0 6px rgba(255,255,255,0.5);}
.next-btn:active{transform:translate(4px,4px);box-shadow:none;}
.next-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:5px 5px 0 #333;}
.back-btn{font-family:'Press Start 2P',monospace;font-size:9px;color:#9966cc;background:transparent;border:1px solid #440066;padding:14px 20px;cursor:pointer;letter-spacing:1px;}
.back-btn:hover{border-color:#cc44ff;color:#cc44ff;}

/* ── RESULT / OUTRO ── */
.result-msg{font-size:14px;line-height:2.2;color:#fff;}
.result-msg .pink{color:#ff88ff;text-shadow:0 0 8px #ff44ff;}
.event-block{border:3px solid #cc44ff;padding:1.2rem 1.4rem;margin-top:1.2rem;box-shadow:0 0 18px rgba(180,0,255,0.4);}
.event-label{font-size:8px;color:#ff88ff;letter-spacing:2px;margin-bottom:.6rem;}
.event-name{font-size:13px;color:#fff;line-height:1.8;margin-bottom:1rem;}
.cta-btn{font-family:'Press Start 2P',monospace;font-size:11px;color:#fff;background:linear-gradient(135deg,#6600cc,#aa00ff);border:3px solid #cc44ff;padding:16px 24px;cursor:pointer;box-shadow:0 0 18px rgba(180,0,255,0.5),5px 5px 0 #330066;letter-spacing:.5px;display:inline-block;line-height:1.8;text-decoration:none;text-shadow:0 0 6px rgba(255,255,255,0.5);}
.cta-btn:active{transform:translate(4px,4px);box-shadow:none;}

.fade-in{animation:fadeIn 0.5s ease forwards;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<video id="bg-video" autoplay muted loop playsinline></video>
<div class="scanlines"></div>

<div id="quiz-wrap">
  <div class="content">
    <div class="arcade-frame">
      <div id="app"></div>
    </div>
  </div>
</div>

<script>
/* ╔═══════════════════════════════════════════════════════════════════╗
   ║  SECTION 1 — CONFIG                                                ║
   ║  The control panel. Edit cities, links, Joey's files, the next    ║
   ║  event, and (later) your Mailchimp connection here.               ║
   ╚═══════════════════════════════════════════════════════════════════╝ */
var CONFIG = {

  /* Background video — paste an MP4 URL to replace the starfield. */
  videoUrl: "",

  /* Joey's animation files. Upload both to your GitHub repo. */
  joeyGif:  "joey_walk-in.gif",   /* walks in on the intro    */
  joeyIdle: "joey_idle.png",      /* stands during questions  */

  /* How long the walk-in GIF plays before the bubble appears (ms). */
  introDelay: 5000,

  /* Cities shown if the user picks "somewhere else" on Q1. */
  cities: ["Los Angeles, CA","Sacramento, CA","Denver, CO","Other"],

  /* The next event teaser shown at the very end. Swap freely. */
  nextEvent: {
    headline: "Skee-Ball League — kicking off August 2026.",
    buttonText: "Join the league →",
    buttonLink: "https://yoursite.com/league"
  },

  /* CTA links per result vibe. */
  links: {
    league: "https://yoursite.com/league",
    event:  "https://yoursite.com/private-events",
    fun:    "https://yoursite.com/events",
    corp:   "https://yoursite.com/corporate"
  }
};


/* ╔═══════════════════════════════════════════════════════════════════╗
   ║  SECTION 2 — VIDEO ACTIVATION  (no edits needed)                  ║
   ╚═══════════════════════════════════════════════════════════════════╝ */
var bgVideo=document.getElementById('bg-video');
var bgCanvas=document.getElementById('bg-canvas');
if(CONFIG.videoUrl){bgVideo.src=CONFIG.videoUrl;bgVideo.style.display='block';bgCanvas.style.display='none';}


/* ╔═══════════════════════════════════════════════════════════════════╗
   ║  SECTION 3 — GALACTIC BACKGROUND  (no edits needed)               ║
   ║  Draws the animated deep-space starfield + floating shapes.       ║
   ╚═══════════════════════════════════════════════════════════════════╝ */
(function(){
  var c=bgCanvas,ctx=c.getContext('2d'),W,H,stars=[],shapes=[],nebulas=[];
  function rand(a,b){return a+Math.random()*(b-a);}
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;init();}
  function init(){
    stars=[];for(var i=0;i<220;i++)stars.push({x:rand(0,W),y:rand(0,H),r:rand(.5,2.2),tw:rand(0,Math.PI*2),sp:rand(.003,.012),br:rand(.4,1)});
    shapes=[];var types=['planet','ring-planet','star4','diamond','triangle','circle','squiggle'];
    for(var j=0;j<26;j++)shapes.push({type:types[Math.floor(Math.random()*types.length)],x:rand(0,W),y:rand(0,H),size:rand(8,30),color:['#cc44ff','#8800ff','#ff44cc','#4488ff','#00ccff','#ff2288'][Math.floor(Math.random()*6)],speed:rand(.1,.4),angle:rand(0,Math.PI*2),rotS:rand(-.012,.012),alpha:rand(.12,.45)});
    nebulas=[];var nc=[{r:120,g:0,b:200},{r:80,g:0,b:160},{r:160,g:0,b:255},{r:100,g:20,b:180}];
    for(var n=0;n<5;n++){var col=nc[n%nc.length];nebulas.push({x:rand(0,W),y:rand(0,H),rx:rand(120,300),ry:rand(80,200),col:col,al:rand(.04,.10)});}
  }
  function dp(x,y,s,col,al,ring){ctx.save();ctx.globalAlpha=al;var g=ctx.createRadialGradient(x-s*.3,y-s*.3,s*.1,x,y,s);g.addColorStop(0,'rgba(255,255,255,0.3)');g.addColorStop(.5,col);g.addColorStop(1,'rgba(0,0,0,0.5)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,s,0,Math.PI*2);ctx.fill();if(ring){ctx.globalAlpha=al*.6;ctx.strokeStyle=col;ctx.lineWidth=s*.25;ctx.beginPath();ctx.ellipse(x,y,s*1.8,s*.5,-.3,0,Math.PI*2);ctx.stroke();}ctx.restore();}
  function ds4(x,y,s,col,al){ctx.save();ctx.globalAlpha=al;ctx.fillStyle=col;ctx.beginPath();for(var i=0;i<8;i++){var r=i%2===0?s:s*.4,a=i*Math.PI/4;i===0?ctx.moveTo(x+r*Math.cos(a),y+r*Math.sin(a)):ctx.lineTo(x+r*Math.cos(a),y+r*Math.sin(a));}ctx.closePath();ctx.fill();ctx.restore();}
  function dtr(x,y,s,col,al){ctx.save();ctx.globalAlpha=al;ctx.strokeStyle=col;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x,y-s);ctx.lineTo(x+s,y+s);ctx.lineTo(x-s,y+s);ctx.closePath();ctx.stroke();ctx.restore();}
  function ddi(x,y,s,col,al){ctx.save();ctx.globalAlpha=al;ctx.strokeStyle=col;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x,y-s);ctx.lineTo(x+s,y);ctx.lineTo(x,y+s);ctx.lineTo(x-s,y);ctx.closePath();ctx.stroke();ctx.restore();}
  function dsq(x,y,s,col,al){ctx.save();ctx.globalAlpha=al;ctx.strokeStyle=col;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x-s,y);ctx.bezierCurveTo(x-s/2,y-s,x+s/2,y+s,x+s,y);ctx.stroke();ctx.restore();}
  function draw(){
    ctx.clearRect(0,0,W,H);
    var bg=ctx.createLinearGradient(0,0,W,H);bg.addColorStop(0,'#050010');bg.addColorStop(.35,'#0d0028');bg.addColorStop(.7,'#160040');bg.addColorStop(1,'#0a0020');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    for(var i=0;i<nebulas.length;i++){var nb=nebulas[i];var ng=ctx.createRadialGradient(nb.x,nb.y,0,nb.x,nb.y,Math.max(nb.rx,nb.ry));ng.addColorStop(0,'rgba('+nb.col.r+','+nb.col.g+','+nb.col.b+','+nb.al+')');ng.addColorStop(1,'rgba('+nb.col.r+','+nb.col.g+','+nb.col.b+',0)');ctx.save();ctx.beginPath();ctx.ellipse(nb.x,nb.y,nb.rx,nb.ry,0,0,Math.PI*2);ctx.fillStyle=ng;ctx.fill();ctx.restore();}
    for(var i=0;i<stars.length;i++){var s=stars[i];s.tw+=s.sp;var al=s.br*(.5+.5*Math.sin(s.tw));ctx.save();ctx.globalAlpha=al;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();if(s.r>1.5){ctx.globalAlpha=al*.4;ctx.strokeStyle='#fff';ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(s.x-s.r*3,s.y);ctx.lineTo(s.x+s.r*3,s.y);ctx.stroke();ctx.beginPath();ctx.moveTo(s.x,s.y-s.r*3);ctx.lineTo(s.x,s.y+s.r*3);ctx.stroke();}ctx.restore();}
    for(var i=0;i<shapes.length;i++){var sh=shapes[i];sh.y+=sh.speed;sh.angle+=sh.rotS;if(sh.y>H+40)sh.y=-40;ctx.save();ctx.translate(sh.x,sh.y);ctx.rotate(sh.angle);if(sh.type==='planet')dp(0,0,sh.size,sh.color,sh.alpha,false);else if(sh.type==='ring-planet')dp(0,0,sh.size,sh.color,sh.alpha,true);else if(sh.type==='star4')ds4(0,0,sh.size,sh.color,sh.alpha);else if(sh.type==='triangle')dtr(0,0,sh.size,sh.color,sh.alpha);else if(sh.type==='diamond')ddi(0,0,sh.size,sh.color,sh.alpha);else if(sh.type==='squiggle')dsq(0,0,sh.size,sh.color,sh.alpha);else{ctx.globalAlpha=sh.alpha;ctx.strokeStyle=sh.color;ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,sh.size,0,Math.PI*2);ctx.stroke();}ctx.restore();}
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);resize();draw();
})();


/* ╔═══════════════════════════════════════════════════════════════════╗
   ║  SECTION 4 — JOEY'S SCRIPT                                         ║
   ║  Every word Joey says. Edit text between the quotes. The intro is  ║
   ║  an ARRAY — each item is its own punchy line on the screen.        ║
   ║  >> Replace [BAR 1/2/3] with real photobooth bar names. <<        ║
   ╚═══════════════════════════════════════════════════════════════════╝ */
var INTRO_LINES = [
  "Hey — you look familiar.",
  "You used one of my photobooths. I've got them in bars all over SF — <span class='pink'>[BAR 1], [BAR 2], [BAR 3]</span> and counting.",
  "I'm Joey. 3x national Skee-Ball champ. I put arcade games in bars, throw private events, and I just opened my own arcade in the Mission."
];

var JOEY_ASKS = {
  q_city:    "I've been in San Francisco since 2008. You?",
  q_skee:    "Have you ever played Skee-Ball?",
  q_role:    "Your friend group is going out. What's your role?",
  q_friday:  "Friday night. Where are you?",
  q_money:   "Someone hands you $100. Do what you want."
};

/* Joey's closing line per vibe (NO segment labels shown to the user). */
var JOEY_RESULTS = {
  league: "I knew it. Come find me at the arcade — I run the city's first Skee-Ball league, and I think you'd fit right in.",
  event:  "You're the one who makes it happen. I've got a whole private arcade in the Mission. Let's make something your people won't stop talking about.",
  fun:    "You're easy — in the best way. Come hang. Games, bar, good people. That's the whole thing.",
  corp:   "Team thing? I've done hundreds of them. Nothing breaks the ice like a Skee-Ball tournament. Let's talk."
};


/* ╔═══════════════════════════════════════════════════════════════════╗
   ║  SECTION 5 — QUESTIONS, SCORING & TAGS                            ║
   ║                                                                   ║
   ║  Each answer does TWO things:                                     ║
   ║   1) vibe: adds points toward a result (league/event/fun/corp)   ║
   ║   2) tags: adds Mailchimp tags for segmentation                  ║
   ║                                                                   ║
   ║  To edit an answer: change its `label` (what they see),          ║
   ║  its `vibe` (points), and its `tags` (segmentation labels).      ║
   ╚═══════════════════════════════════════════════════════════════════╝ */
var LETTERS=['A','B','C','D'];

var QUESTIONS = [

  /* Q1 — CITY. Special type: A/B/C advance instantly; D opens a dropdown. */
  { id:"q_city", type:"city", options:[
    { label:"SF local.",              tags:["lives-sf"],   vibe:{} },
    { label:"Bay Area — close enough.",tags:["bay-area"],  vibe:{} },
    { label:"Just visiting.",          tags:["visitor"],   vibe:{} },
    { label:"Somewhere else.",         tags:["out-of-area"],vibe:{}, opensDropdown:true }
  ]},

  /* Q2 — SKEE-BALL */
  { id:"q_skee", type:"choice", options:[
    { label:"Yeah — I'm actually pretty good.", tags:["skeeball-competitor"], vibe:{league:4} },
    { label:"Once or twice. Fun game.",          tags:["skeeball-casual"],     vibe:{fun:2,league:1} },
    { label:"Never. But I'm curious.",           tags:["skeeball-curious"],    vibe:{fun:2} },
    { label:"Not really my thing.",              tags:["arcade-general"],      vibe:{fun:1} }
  ]},

  /* Q3 — GROUP ROLE */
  { id:"q_role", type:"choice", options:[
    { label:"I picked the place.",          tags:["planner","interested-in-events"], vibe:{corp:3,event:2} },
    { label:"I just showed up.",            tags:["fun-seeker"],                     vibe:{fun:3} },
    { label:"I'm taking photos of everything.",tags:["photobooth-fan"],             vibe:{event:2,fun:1} },
    { label:"I talked everyone into coming.", tags:["social-connector"],            vibe:{fun:2,event:1} }
  ]},

  /* Q4 — FRIDAY NIGHT */
  { id:"q_friday", type:"choice", options:[
    { label:"At a bar in the city.",     tags:["local-social"],            vibe:{fun:2} },
    { label:"At a party I didn't plan.", tags:["fun-seeker"],              vibe:{fun:3} },
    { label:"Hosting something.",        tags:["private-events","buyer"],  vibe:{event:3,corp:1} },
    { label:"Home. No shame.",           tags:["low-commitment"],          vibe:{fun:1} }
  ]},

  /* Q5 — $100 */
  { id:"q_money", type:"choice", options:[
    { label:"Rounds for everyone.",                  tags:["social"],                 vibe:{fun:3} },
    { label:"Tickets to something.",                 tags:["event-attendee"],         vibe:{event:3,fun:1} },
    { label:"Put it toward renting something out.",  tags:["private-events","buyer"], vibe:{corp:3,event:2} },
    { label:"Arcade tokens. Obviously.",             tags:["arcade-fan","league"],    vibe:{league:3,fun:1} }
  ]}
];


/* ╔═══════════════════════════════════════════════════════════════════╗
   ║  SECTION 6 — TAG COLLECTION & MAILCHIMP HOOK                      ║
   ║                                                                   ║
   ║  Tags collect here as the user answers. "Silent submission"       ║
   ║  fires on every NEXT — so even a partial quiz captures data.      ║
   ║                                                                   ║
   ║  >> TO CONNECT MAILCHIMP: put your integration inside             ║
   ║     submitToMailchimp(). Right now it logs to the browser         ║
   ║     console so you can see exactly what would be sent. <<         ║
   ╚═══════════════════════════════════════════════════════════════════╝ */
var userTags = [];   /* all tags collected so far  */
var userData = {};   /* name, email, address, city */

function addTags(tags){
  if(!tags) return;
  tags.forEach(function(t){ if(userTags.indexOf(t)===-1) userTags.push(t); });
}

/* Called on every advance (silent submission) and at the end. */
function submitToMailchimp(isFinal){
  /* ---- WHAT WOULD BE SENT ---- */
  var payload = { tags:userTags, data:userData, complete:!!isFinal };
  console.log("[Mailchimp submission]", payload);

  /* ---- WIRE UP MAILCHIMP HERE ----
     Example (using a serverless function or Zapier webhook):

     fetch("https://your-endpoint.com/mailchimp", {
       method:"POST",
       headers:{"Content-Type":"application/json"},
       body:JSON.stringify(payload)
     });

     Mailchimp's API needs a backend (you can't call it safely from
     the browser). Easiest path: a Zapier "Catch Hook" → Mailchimp
     "Add/Update Subscriber" zap. Paste that webhook URL above.
  -------------------------------------------------------------- */
}


/* ╔═══════════════════════════════════════════════════════════════════╗
   ║  SECTION 7 — QUIZ ENGINE  (the machinery — edit with care)        ║
   ╚═══════════════════════════════════════════════════════════════════╝ */
var phase='intro';                 /* intro | quiz | result            */
var currentQ=0;                    /* which visible question we're on  */
var scores={fun:0,league:0,event:0,corp:0};
var pendingAnswer=null;            /* index of selected option         */
var pendingCity=null;              /* dropdown city, if chosen         */
var advancing=false;               /* lock to prevent double-clicks    */
var advanceTimer=null;
var quizHistory=[];                /* for the BACK button              */
var app=document.getElementById('app');

/* JOEY_SIZE — change this one number to resize Joey everywhere. */
var JOEY_SIZE = 200;

/* Click handling is delegated (one listener for all buttons). */
app.addEventListener('click',function(e){
  var btn=e.target.closest('[data-action]');
  if(!btn||advancing)return;
  var a=btn.getAttribute('data-action');
  if(a==='start')           startQuiz();
  else if(a==='choice')     selectChoice(parseInt(btn.getAttribute('data-idx'),10),btn);
  else if(a==='city')       selectCity(parseInt(btn.getAttribute('data-idx'),10),btn);
  else if(a==='next')       advanceQuestion();
  else if(a==='back')       goBack();
  else if(a==='restart')    restart();
  else if(a==='slap')       chooseSlap(btn.getAttribute('data-value'));
});
app.addEventListener('change',function(e){
  if(e.target.id==='city-dd'){pendingCity=e.target.value;var nb=document.getElementById('next-btn');if(nb)nb.disabled=(pendingCity==='');}
});

function totalScore(){return Object.values(scores).reduce(function(a,b){return a+b;},0)*10;}
function getWinner(){return Object.entries(scores).sort(function(a,b){return b[1]-a[1];})[0][0];}
function joeyImg(){return '<img src="'+CONFIG.joeyIdle+'" alt="Joey" style="width:'+JOEY_SIZE+'px;height:auto;image-rendering:pixelated;animation:joey-breathe 1.8s ease-in-out infinite;">';}
function joeyPanel(){return '<div class="joey-side">'+joeyImg()+'<p class="joey-name">JOEY</p></div>';}

/* ── INTRO ── */
function renderIntro(){
  var lines=INTRO_LINES.map(function(l){return '<p>'+l+'</p>';}).join('');
  app.innerHTML=
    '<div id="intro-screen">'+
      '<span class="brand-title">JOEY THE CAT</span>'+
      '<div class="px-divider"></div>'+
      '<div id="intro-joey-row">'+
        '<div id="intro-joey-wrap">'+
          '<img id="intro-gif" src="'+CONFIG.joeyGif+'" alt="Joey walking in">'+
          '<img id="intro-idle" src="'+CONFIG.joeyIdle+'" alt="Joey">'+
          '<p class="joey-name" style="margin-top:12px;">JOEY</p>'+
        '</div>'+
        '<div id="intro-bubble">'+lines+'</div>'+
      '</div>'+
      '<div id="intro-cta">'+
        '<button type="button" class="start-btn" data-action="start">&#9654; LET\'S GO</button>'+
        '<p style="font-size:9px;color:#550088;margin-top:1.4rem;" class="blink">Start</p>'+
      '</div>';
  document.querySelector('#intro-idle').style.width=JOEY_SIZE+'px';
  document.querySelector('#intro-gif').style.width=JOEY_SIZE+'px';
  setTimeout(function(){
    var gif=document.getElementById('intro-gif');
    if(gif)gif.style.transform='translateX(0)';
    setTimeout(function(){
      var g=document.getElementById('intro-gif'),id=document.getElementById('intro-idle');
      var b=document.getElementById('intro-bubble'),c=document.getElementById('intro-cta');
      if(g)g.style.display='none';
      if(id)id.style.display='block';
      if(b)b.classList.add('visible');
      if(c)c.classList.add('visible');
    },CONFIG.introDelay);
  },100);
}

/* ── QUESTION ── */
function renderQuestion(){
  var q=QUESTIONS[currentQ];
  if(!q){phase='result';render();return;}
  var progress=Math.round(((currentQ+1)/QUESTIONS.length)*100);
  pendingAnswer=null;pendingCity=null;
  var joeyLine=JOEY_ASKS[q.id]||'';
  var body='';

  if(q.type==='city'){
    body='<div class="options-grid" id="opt-grid">'+
      q.options.map(function(o,i){return '<button type="button" class="pxbtn" data-action="city" data-idx="'+i+'"><span class="ltr">'+LETTERS[i]+'.</span>'+o.label+'</button>';}).join('')+
    '</div>'+
    '<div id="city-dropdown" style="display:none;">'+
      '<div class="city-wrap"><p class="city-label">// WHICH ONE?</p>'+
        '<div class="select-wrap"><select class="city-select" id="city-dd"><option value="">— pick your city —</option>'+
          CONFIG.cities.map(function(c){return '<option value="'+c+'">'+c+'</option>';}).join('')+
        '</select></div>'+
      '</div>'+
      '<div class="nav-row"><button type="button" class="next-btn" id="next-btn" data-action="next" disabled>NEXT &#9654;</button></div>'+
    '</div>';
  } else {
    body='<div class="options-grid" id="opt-grid">'+
      q.options.map(function(o,i){return '<button type="button" class="pxbtn" data-action="choice" data-idx="'+i+'"><span class="ltr">'+LETTERS[i]+'.</span>'+o.label+'</button>';}).join('')+
    '</div>';
  }

  var backBtn = currentQ>0 ? '<div class="nav-row"><button type="button" class="back-btn" data-action="back">&#8617; BACK</button></div>' : '';

  app.innerHTML=
    '<div class="hud"><span>STAGE '+(currentQ+1)+'-'+QUESTIONS.length+'</span><span>SCORE: '+totalScore()+'</span></div>'+
    '<div class="progress-rail"><div class="progress-fill" style="width:'+progress+'%"></div></div>'+
    '<div class="joey-layout">'+
      joeyPanel()+
      '<div class="bubble-side fade-in">'+
        '<div class="speech-bubble"><p class="bubble-label">// JOEY</p><p class="bubble-text">'+joeyLine+'</p></div>'+
        body+
        backBtn+
      '</div>'+
    '</div>';
}

/* ── RESULT + OUTRO (one screen) ── */
function renderResult(){
  var winner=getWinner();
  var msg=JOEY_RESULTS[winner];
  submitToMailchimp(true); /* final submission */

  app.innerHTML=
    '<div class="hud" style="justify-content:center;"><span>NICE TO MEET YOU</span></div>'+
    '<div class="progress-rail"><div class="progress-fill" style="width:100%"></div></div>'+
    '<div class="joey-layout" style="align-items:flex-start;">'+
      joeyPanel()+
      '<div class="bubble-side fade-in">'+
        '<div class="speech-bubble"><p class="bubble-label">// JOEY</p><p class="result-msg">'+msg+'</p></div>'+
        /* Slap bracelet offer */
        '<div class="speech-bubble" style="margin-top:6px;">'+
          '<p class="bubble-label">// ONE MORE THING</p>'+
          '<p class="result-msg">Want a slap bracelet? I\'ll mail you one.</p>'+
          '<div class="options-grid" style="grid-template-columns:1fr;margin-top:14px;">'+
            '<button type="button" class="pxbtn" data-action="slap" data-value="ship"><span class="ltr">&#9654;</span>Ship it to me</button>'+
            '<button type="button" class="pxbtn" data-action="slap" data-value="voucher"><span class="ltr">&#9654;</span>Email me a voucher instead</button>'+
            '<button type="button" class="pxbtn" data-action="slap" data-value="person"><span class="ltr">&#9654;</span>I\'ll grab it in person</button>'+
          '</div>'+
          '<div id="slap-form"></div>'+
        '</div>'+
        /* Next event */
        '<div class="event-block">'+
          '<p class="event-label">// NEXT UP</p>'+
          '<p class="event-name">'+CONFIG.nextEvent.headline+'</p>'+
          '<a class="cta-btn" href="'+CONFIG.nextEvent.buttonLink+'" target="_blank">'+CONFIG.nextEvent.buttonText+'</a>'+
        '</div>'+
        '<div class="nav-row"><button type="button" class="back-btn" data-action="restart">&#8617; START OVER</button></div>'+
      '</div>'+
    '</div>';
}

/* Slap bracelet sub-flow — reveals the right form. */
function chooseSlap(choice){
  addTags(["slap-"+choice]);
  var box=document.getElementById('slap-form');
  if(!box)return;
  if(choice==='ship'){
    box.innerHTML=
      '<div class="field"><label>YOUR NAME</label><input id="f-name" type="text"></div>'+
      '<div class="field"><label>MAILING ADDRESS</label><input id="f-addr" type="text"></div>'+
      '<div class="nav-row"><button type="button" class="next-btn" id="slap-save" data-action="none">SEND IT &#9654;</button></div>';
  } else if(choice==='voucher'){
    box.innerHTML=
      '<div class="field"><label>YOUR EMAIL</label><input id="f-email" type="email"></div>'+
      '<div class="nav-row"><button type="button" class="next-btn" id="slap-save" data-action="none">GET VOUCHER &#9654;</button></div>';
  } else {
    box.innerHTML='<p class="result-msg" style="margin-top:14px;">Perfect. See you at the arcade. &#128062;</p>';
  }
  var save=document.getElementById('slap-save');
  if(save){
    save.addEventListener('click',function(){
      var n=document.getElementById('f-name'),a=document.getElementById('f-addr'),e=document.getElementById('f-email');
      if(n)userData.name=n.value;
      if(a)userData.address=a.value;
      if(e)userData.email=e.value;
      submitToMailchimp(true);
      box.innerHTML='<p class="result-msg" style="margin-top:14px;">Got it. Keep an eye on your mailbox. &#128062;</p>';
    });
  }
}

function render(){
  if(phase==='intro')renderIntro();
  else if(phase==='quiz')renderQuestion();
  else renderResult();
}

/* ── ADVANCE LOGIC ── */
function scheduleAdvance(){if(advanceTimer)clearTimeout(advanceTimer);advanceTimer=setTimeout(function(){advanceTimer=null;advanceQuestion();},300);}

function selectChoice(i,el){
  if(phase!=='quiz'||advancing)return;
  var grid=document.getElementById('opt-grid');
  if(grid)grid.querySelectorAll('.pxbtn').forEach(function(b){b.classList.remove('selected');});
  el.classList.add('selected');
  pendingAnswer=i;
  scheduleAdvance();
}

function selectCity(i,el){
  if(phase!=='quiz'||advancing)return;
  var grid=document.getElementById('opt-grid');
  if(grid)grid.querySelectorAll('.pxbtn').forEach(function(b){b.classList.remove('selected');});
  el.classList.add('selected');
  pendingAnswer=i;
  var q=QUESTIONS[currentQ];
  if(q.options[i].opensDropdown){
    /* show the dropdown, wait for NEXT */
    document.getElementById('city-dropdown').style.display='block';
  } else {
    /* A/B/C — advance immediately */
    scheduleAdvance();
  }
}

function advanceQuestion(){
  if(phase!=='quiz'||advancing)return;
  var q=QUESTIONS[currentQ];
  if(pendingAnswer===null)return;
  var opt=q.options[pendingAnswer];

  /* city dropdown requires a city picked before NEXT works */
  if(q.type==='city'&&opt.opensDropdown){
    if(!pendingCity)return;
    userData.city=pendingCity;
    addTags(["city-"+pendingCity.toLowerCase().replace(/[^a-z]/g,'-')]);
  }

  advancing=true;
  quizHistory.push({currentQ:currentQ,scores:JSON.stringify(scores),tags:JSON.stringify(userTags),data:JSON.stringify(userData)});

  /* apply vibe + tags */
  if(opt.vibe)Object.entries(opt.vibe).forEach(function(e){scores[e[0]]=(scores[e[0]]||0)+e[1];});
  addTags(opt.tags);

  submitToMailchimp(false); /* SILENT SUBMISSION — captures partial quizzes */

  pendingAnswer=null;pendingCity=null;
  currentQ++;
  if(currentQ>=QUESTIONS.length)phase='result';
  render();
  advancing=false;
}

function goBack(){
  if(!quizHistory.length)return;
  var p=quizHistory.pop();
  currentQ=p.currentQ;
  scores=JSON.parse(p.scores);
  userTags=JSON.parse(p.tags);
  userData=JSON.parse(p.data);
  pendingAnswer=null;pendingCity=null;
  if(phase==='result')phase='quiz';
  render();
}

function startQuiz(){phase='quiz';currentQ=0;scores={fun:0,league:0,event:0,corp:0};userTags=[];userData={};pendingAnswer=null;pendingCity=null;quizHistory=[];render();}
function restart(){phase='intro';currentQ=0;scores={fun:0,league:0,event:0,corp:0};userTags=[];userData={};pendingAnswer=null;pendingCity=null;quizHistory=[];render();}

render();
</script>
