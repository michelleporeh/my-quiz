<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Player Type</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Press Start 2P', monospace;
  background: #0a0a0f;
  color: #fff;
  min-height: 100vh;
}

#quiz-wrap {
  position: relative;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
}

#video-bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  opacity: 0.22;
  z-index: 0;
  pointer-events: none;
}

.scanlines {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.13) 0px,
    rgba(0,0,0,0.13) 1px,
    transparent 1px,
    transparent 3px
  );
  z-index: 1;
  pointer-events: none;
}

.content {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 660px;
}

.arcade-frame {
  border: 4px solid #ffe600;
  background: rgba(0,0,0,0.88);
  padding: 2rem 2rem 2.5rem;
  position: relative;
  box-shadow: 6px 6px 0 #b38f00, inset 0 0 0 2px rgba(255,230,0,0.1);
}

.arcade-frame::before {
  content: '';
  position: absolute;
  top: 6px; left: 6px; right: 6px; bottom: 6px;
  border: 1px solid rgba(255,230,0,0.15);
  pointer-events: none;
}

.hud {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 6px;
  color: #ffe600;
  letter-spacing: 1px;
  margin-bottom: 1.2rem;
}

.progress-rail {
  width: 100%;
  height: 6px;
  background: #1a1a1a;
  border: 1px solid #333;
  margin-bottom: 1.8rem;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #ffe600, #ffaa00);
  transition: width 0.35s ease;
}

.q-label {
  font-size: 6px;
  color: #00d8ff;
  letter-spacing: 2px;
  margin-bottom: 0.6rem;
}

.q-text {
  font-size: 9px;
  line-height: 2.1;
  color: #fff;
  margin-bottom: 1.6rem;
  min-height: 40px;
}

.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.options-grid.single-col {
  grid-template-columns: 1fr;
}

.pxbtn {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  line-height: 1.75;
  color: #fff;
  background: #0d0d0d;
  border: 3px solid #555;
  padding: 13px 10px;
  cursor: pointer;
  text-align: left;
  position: relative;
  width: 100%;
  letter-spacing: 0.3px;
  transition: border-color 0.1s, background 0.1s, color 0.1s;
}

.pxbtn::after {
  content: '';
  position: absolute;
  bottom: -5px; right: -5px;
  width: 100%; height: 100%;
  background: #333;
  z-index: -1;
  transition: background 0.1s;
}

.pxbtn:hover {
  background: #ffe600;
  color: #000;
  border-color: #ffe600;
}

.pxbtn:hover::after { background: #b38f00; }

.pxbtn:active { transform: translate(3px, 3px); }
.pxbtn:active::after { display: none; }

.pxbtn .ltr {
  color: #00d8ff;
  margin-right: 6px;
  font-size: 8px;
}

.pxbtn:hover .ltr { color: #000; }

.pxbtn.selected {
  background: #ffe600;
  color: #000;
  border-color: #ffe600;
}

.pxbtn.selected .ltr { color: #000; }
.pxbtn.selected::after { background: #b38f00; }

.yes-no-row {
  display: flex;
  gap: 12px;
}

.yes-no-row .pxbtn {
  flex: 1;
  text-align: center;
  font-size: 9px;
  padding: 16px;
}

.city-wrap { margin-top: 0.8rem; }

.city-label {
  font-size: 6px;
  color: #aaa;
  letter-spacing: 1px;
  margin-bottom: 0.5rem;
}

.city-select {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  width: 100%;
  background: #0d0d0d;
  color: #fff;
  border: 3px solid #555;
  padding: 12px 10px;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  outline: none;
}

.city-select:focus { border-color: #ffe600; }
.city-select option { background: #111; color: #fff; }

.select-wrap { position: relative; }

.select-wrap::after {
  content: '▼';
  font-size: 6px;
  color: #ffe600;
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
}

.next-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  color: #000;
  background: #ffe600;
  border: 3px solid #ffe600;
  padding: 14px 28px;
  cursor: pointer;
  position: relative;
  margin-top: 1.4rem;
  letter-spacing: 1px;
  display: inline-block;
  box-shadow: 4px 4px 0 #b38f00;
}

.next-btn:active { transform: translate(3px,3px); box-shadow: none; }

.next-btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
  transform: none;
  box-shadow: 4px 4px 0 #555;
}

.px-divider {
  width: 100%;
  height: 2px;
  background: repeating-linear-gradient(
    90deg,
    #ffe600 0px, #ffe600 6px,
    transparent 6px, transparent 12px
  );
  margin: 1.4rem 0;
  opacity: 0.25;
}

.start-screen { text-align: center; }

.big-title {
  font-size: 11px;
  color: #ffe600;
  text-shadow: 3px 3px 0 #b38f00;
  letter-spacing: 3px;
  line-height: 2.2;
  display: block;
  margin-bottom: 1rem;
}

.tagline {
  font-size: 7px;
  color: #00d8ff;
  line-height: 2.4;
  margin-bottom: 1.5rem;
  display: block;
}

.lives { color: #ff4d4d; font-size: 12px; letter-spacing: 6px; }

.start-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  color: #000;
  background: #ffe600;
  border: 4px solid #fff;
  padding: 16px 36px;
  cursor: pointer;
  letter-spacing: 2px;
  box-shadow: 5px 5px 0 #b38f00;
  margin-top: 1.5rem;
  display: inline-block;
}

.start-btn:active { transform: translate(4px,4px); box-shadow: none; }

.blink { animation: blink 1.1s step-start infinite; }
@keyframes blink { 50% { opacity: 0; } }

.result-screen { text-align: center; }
.result-label { font-size: 6px; color: #00d8ff; letter-spacing: 2px; margin-bottom: 0.8rem; }

.result-badge {
  display: inline-block;
  border: 4px solid #ffe600;
  padding: 1.2rem 1.8rem;
  margin: 0.8rem 0 1.2rem;
  position: relative;
  box-shadow: 5px 5px 0 #b38f00;
}

.result-icon { font-size: 30px; display: block; margin-bottom: 0.5rem; }

.result-name {
  font-size: 13px;
  color: #ffe600;
  text-shadow: 2px 2px 0 #b38f00;
  letter-spacing: 2px;
  display: block;
  margin-bottom: 0.4rem;
}

.result-sub { font-size: 7px; color: #aaa; line-height: 2; }

.cta-msg {
  font-size: 7px;
  line-height: 2.4;
  color: #ddd;
  text-align: left;
  margin: 1rem 0 1.2rem;
}

.cta-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  color: #000;
  background: #ffe600;
  border: 3px solid #ffe600;
  padding: 13px 20px;
  cursor: pointer;
  box-shadow: 4px 4px 0 #b38f00;
  letter-spacing: 0.5px;
  display: inline-block;
  line-height: 2;
  text-decoration: none;
}

.cta-btn:active { transform: translate(3px,3px); box-shadow: none; }

.replay-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 6px;
  color: #888;
  background: transparent;
  border: 2px solid #333;
  padding: 10px 16px;
  cursor: pointer;
  margin-top: 1rem;
  display: inline-block;
  letter-spacing: 1px;
}

.replay-btn:hover { border-color: #ffe600; color: #ffe600; }

.config-note {
  font-family: 'Press Start 2P', monospace;
  font-size: 6px;
  color: #333;
  text-align: center;
  margin-top: 1rem;
  line-height: 2;
  letter-spacing: 0.5px;
}
</style>
</head>
<body>

<div id="quiz-wrap">
  <video id="video-bg" autoplay muted loop playsinline>
    <source src="" type="video/mp4">
  </video>
  <div class="scanlines"></div>

  <div class="content">
    <div class="arcade-frame">
      <div id="app"></div>
    </div>
    <p class="config-note">// edit CONFIG at top of script to swap video, cities &amp; CTA links</p>
  </div>
</div>

<script>
/* ============================================================
   CONFIG — edit everything here, touch nothing else
   ============================================================ */
var CONFIG = {
  videoUrl: "",                        // paste your .mp4 URL here

  cities: [
    "Los Angeles, CA",
    "Sacramento, CA",
    "Denver, CO",
    "City Four (coming soon)",          // replace with real city
    "City Five (coming soon)"           // replace with real city
  ],

  links: {
    funSeeker:    "https://yoursite.com/events",       // walk-in / events page
    leaguePlayer: "https://yoursite.com/league",       // skeeball league signup
    eventBooker:  "https://yoursite.com/private-events", // private event packages
    corpPlanner:  "https://yoursite.com/corporate"    // corporate inquiry form
  }
};
/* ============================================================ */

// Activate video background
var videoEl = document.getElementById('video-bg');
if (CONFIG.videoUrl) {
  videoEl.querySelector('source').src = CONFIG.videoUrl;
  videoEl.load();
}

var LETTERS = ['A','B','C','D'];

var SEGMENTS = {
  fun: {
    name: "FUN SEEKER",
    icon: "🕹️",
    tagline: "Born to play. Here for the energy.",
    msg: "You don't need a reason to show up — just show up. We've got the games, the drinks, and the crowd. See what's going on this week and come claim your high score.",
    cta: "See What's Happening This Week →",
    link: function() { return CONFIG.links.funSeeker; }
  },
  league: {
    name: "LEAGUE PLAYER",
    icon: "🎳",
    tagline: "You're not here to play around. You're here to WIN.",
    msg: "The league is your arena. Compete weekly, climb the leaderboard, and earn your spot in the hall of fame. Spots fill fast — lock yours in now.",
    cta: "Join the Skeeball League →",
    link: function() { return CONFIG.links.leaguePlayer; }
  },
  event: {
    name: "EVENT BOOKER",
    icon: "🎉",
    tagline: "You make the magic happen for everyone else.",
    msg: "Birthdays, milestones, celebrations — you want something memorable and personal. Let us help you design a private event your people will be talking about all year.",
    cta: "Explore Private Event Packages →",
    link: function() { return CONFIG.links.eventBooker; }
  },
  corp: {
    name: "CORPORATE PLANNER",
    icon: "💼",
    tagline: "You've got a vision and a headcount. Let's execute.",
    msg: "Team outings, client entertainment, company milestones — we handle the details so you can focus on the impression. Get in touch and let's build your custom proposal.",
    cta: "Request a Corporate Proposal →",
    link: function() { return CONFIG.links.corpPlanner; }
  }
};

var QUESTIONS = [
  {
    id: "city_check",
    text: "DO YOU LIVE IN THE CITY?",
    type: "yes_no"
  },
  {
    id: "city_select",
    text: "WHICH CITY ARE YOU IN?",
    type: "city_dropdown",
    showIf: function(state) { return state.answers.city_check === "no"; }
  },
  {
    id: "group_role",
    text: "WHAT'S YOUR ROLE IN THE GROUP CHAT?",
    type: "choice",
    options: [
      { label: "The planner",          points: { corp: 3, event: 2 } },
      { label: "The first RSVP",       points: { fun: 3, event: 1 } },
      { label: "The documentarian",    points: { event: 2, fun: 1 } },
      { label: "I bring the vibes \uD83D\uDC85", points: { fun: 3, league: 1 } }
    ]
  },
  {
    id: "hundred_dollars",
    text: "SOMEONE HANDS YOU $100 AND SAYS \"DO WHAT YOU WANT.\" HOW'RE YOU SPENDING IT?",
    type: "choice",
    options: [
      { label: "Arcade tokens",                 points: { fun: 3, league: 2 } },
      { label: "Drinks with friends",           points: { fun: 3, event: 1 } },
      { label: "Tickets to an event",           points: { event: 3, fun: 1 } },
      { label: "Rent out something ridiculous", points: { corp: 3, event: 2 } }
    ]
  },
  {
    id: "friday_night",
    text: "IT'S FRIDAY NIGHT. WHERE ARE YOU?",
    type: "choice",
    options: [
      { label: "Dominating a skeeball match",           points: { league: 4 } },
      { label: "At a party with friends",               points: { fun: 3, event: 1 } },
      { label: "Hunting for the perfect photobooth strips", points: { event: 3, fun: 1 } },
      { label: "On my couch and loving it",             points: { fun: 2 } }
    ]
  }
];

var phase = 'start';
var qIndex = 0;
var scores = { fun: 0, league: 0, event: 0, corp: 0 };
var state = { answers: {}, pendingCity: null };
var pendingAnswer = null;

var app = document.getElementById('app');

function getVisibleQuestions() {
  return QUESTIONS.filter(function(q) {
    return !q.showIf || q.showIf(state);
  });
}

function totalScore() {
  return Object.values(scores).reduce(function(a, b) { return a + b; }, 0) * 10;
}

function getWinner() {
  return Object.entries(scores).sort(function(a, b) { return b[1] - a[1]; })[0][0];
}

function render() {
  if (phase === 'start')  { renderStart(); return; }
  if (phase === 'result') { renderResult(); return; }
  renderQuestion();
}

function renderStart() {
  app.innerHTML =
    '<div class="start-screen">' +
      '<div class="hud"><span>1UP</span><span>HI-SCORE: 9999</span><span>2UP</span></div>' +
      '<div class="px-divider"></div>' +
      '<span class="big-title">FIND YOUR<br>PLAYER TYPE</span>' +
      '<span class="tagline">Answer a few quick questions.<br>Unlock your perfect experience.<br>No boss battles. Promise.</span>' +
      '<div class="px-divider"></div>' +
      '<div style="margin:1.2rem 0;"><span class="lives">&#9829; &#9829; &#9829;</span></div>' +
      '<button class="start-btn" onclick="startQuiz()">&#9654; INSERT COIN</button>' +
      '<p style="font-size:6px;color:#555;margin-top:1.8rem;" class="blink">PRESS START</p>' +
    '</div>';
}

function renderQuestion() {
  var visible = getVisibleQuestions();
  var q = visible[qIndex];
  if (!q) { phase = 'result'; render(); return; }

  var progress = Math.round((qIndex / visible.length) * 100);
  pendingAnswer = null;

  var bodyHtml = '';

  if (q.type === 'yes_no') {
    bodyHtml =
      '<div class="yes-no-row">' +
        '<button class="pxbtn" onclick="selectYesNo(\'yes\')"><span class="ltr">A.</span>Yes</button>' +
        '<button class="pxbtn" onclick="selectYesNo(\'no\')"><span class="ltr">B.</span>No</button>' +
      '</div>';
  }
  else if (q.type === 'city_dropdown') {
    var opts = CONFIG.cities.map(function(c) {
      return '<option value="' + c + '">' + c + '</option>';
    }).join('');
    bodyHtml =
      '<div class="city-wrap">' +
        '<p class="city-label">// SELECT YOUR CITY</p>' +
        '<div class="select-wrap">' +
          '<select class="city-select" id="city-dd" onchange="cityChosen(this.value)">' +
            '<option value="">&#8212; pick your city &#8212;</option>' +
            opts +
          '</select>' +
        '</div>' +
      '</div><br>' +
      '<button class="next-btn" id="city-next-btn" onclick="confirmCity()" disabled>NEXT &#9654;</button>';
  }
  else if (q.type === 'choice') {
    var cols = q.options.length > 2 ? '' : 'single-col';
    bodyHtml =
      '<div class="options-grid ' + cols + '" id="opt-grid">' +
        q.options.map(function(opt, i) {
          return '<button class="pxbtn" data-idx="' + i + '" onclick="selectChoice(' + i + ', this)">' +
            '<span class="ltr">' + LETTERS[i] + '.</span>' + opt.label +
          '</button>';
        }).join('') +
      '</div><br>' +
      '<button class="next-btn" id="next-btn" onclick="advanceQuestion()" disabled>NEXT &#9654;</button>';
  }

  app.innerHTML =
    '<div class="hud">' +
      '<span>STAGE ' + (qIndex + 1) + '-' + visible.length + '</span>' +
      '<span>SCORE: ' + totalScore() + '</span>' +
    '</div>' +
    '<div class="progress-rail">' +
      '<div class="progress-fill" style="width:' + progress + '%"></div>' +
    '</div>' +
    '<p class="q-label">// QUESTION ' + (qIndex + 1) + ' OF ' + visible.length + '</p>' +
    '<p class="q-text">' + q.text + '</p>' +
    bodyHtml;
}

function selectYesNo(val) {
  state.answers.city_check = val;
  var btns = app.querySelectorAll('.pxbtn');
  btns.forEach(function(b) { b.classList.remove('selected'); });
  btns[val === 'yes' ? 0 : 1].classList.add('selected');
  setTimeout(advanceQuestion, 280);
}

function cityChosen(val) {
  state.pendingCity = val;
  var btn = document.getElementById('city-next-btn');
  if (btn) btn.disabled = (val === '');
}

function confirmCity() {
  state.answers.city_select = state.pendingCity;
  advanceQuestion();
}

function selectChoice(i, el) {
  var grid = document.getElementById('opt-grid');
  if (grid) grid.querySelectorAll('.pxbtn').forEach(function(b) { b.classList.remove('selected'); });
  el.classList.add('selected');
  pendingAnswer = i;
  var nb = document.getElementById('next-btn');
  if (nb) nb.disabled = false;
}

function advanceQuestion() {
  var visible = getVisibleQuestions();
  var q = visible[qIndex];

  if (q.type === 'choice' && pendingAnswer !== null) {
    var pts = q.options[pendingAnswer].points || {};
    Object.entries(pts).forEach(function(entry) {
      scores[entry[0]] = (scores[entry[0]] || 0) + entry[1];
    });
  }

  qIndex++;
  if (qIndex >= visible.length) { phase = 'result'; }
  render();
}

function renderResult() {
  var winner = getWinner();
  var seg = SEGMENTS[winner];
  app.innerHTML =
    '<div class="result-screen">' +
      '<div class="hud" style="justify-content:center;"><span>GAME CLEAR &mdash; FINAL SCORE: ' + totalScore() + '</span></div>' +
      '<div class="px-divider"></div>' +
      '<p class="result-label">// YOUR PLAYER TYPE IS...</p>' +
      '<div class="result-badge">' +
        '<span class="result-icon">' + seg.icon + '</span>' +
        '<span class="result-name">' + seg.name + '</span>' +
        '<span class="result-sub">' + seg.tagline + '</span>' +
      '</div>' +
      '<div class="px-divider"></div>' +
      '<p class="cta-msg">' + seg.msg + '</p>' +
      '<div>' +
        '<a class="cta-btn" href="' + seg.link() + '" target="_blank">' + seg.cta + '</a>' +
      '</div>' +
      '<div style="margin-top:1.8rem;">' +
        '<button class="replay-btn" onclick="restart()">&#8617; PLAY AGAIN</button>' +
      '</div>' +
    '</div>';
}

function startQuiz() {
  phase = 'quiz';
  qIndex = 0;
  scores = { fun: 0, league: 0, event: 0, corp: 0 };
  state = { answers: {}, pendingCity: null };
  pendingAnswer = null;
  render();
}

function restart() { startQuiz(); }

render();
</script>
</body>
</html>
